name: Notificar cambio de menú
on:
  push:
    paths:
      - 'config.ts' # Solo si cambia el menú

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar señal al repo privado
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.PRIV_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/diegoaep07/sushimist-web/dispatches \
          -d '{"event_type": "update_from_client"}'
